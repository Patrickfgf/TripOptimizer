# Render Blueprint — TripOptimizer backend (FastAPI Web Service).
# The frontend deploys separately on Vercel (see ./vercel.json).
# Spec: https://render.com/docs/blueprint-spec
#
# One-time setup: New > Blueprint, point Render at this repo. Render reads this
# file, provisions the service, and asks you to fill the `sync: false` vars below.
services:
  - type: web
    name: tripoptimizer-api
    runtime: python
    plan: free
    rootDir: backend # pyproject.toml, uv.lock, data/ and .python-version live here
    # uv reads .python-version + uv.lock; --frozen aborts the build if the lock drifts.
    buildCommand: "pip install uv && uv sync --frozen"
    # Render injects $PORT and probes for an open port; bind 0.0.0.0 or the deploy
    # is marked unreachable. Never hardcode 8000 here.
    startCommand: "uv run uvicorn tripoptimizer.api.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # REQUIRED. Comma-separated allowlist of browser origins for CORS.
      # Set to your exact Vercel production URL, e.g. https://tripoptimizer.vercel.app
      # If unset, CORS defaults to http://localhost:5173 and the live frontend is blocked.
      - key: FRONTEND_ORIGINS
        sync: false
      # OPTIONAL. Travelpayouts token turns on on-demand real fares (each missing
      # cell is fetched live once, then cached in-process). Unset -> the service
      # serves the committed snapshot + synthetic fallback (no behaviour change).
      - key: TRAVELPAYOUTS_TOKEN
        sync: false
      # Travelpayouts market (EU markets are denser); used only with the token.
      - key: TRAVELPAYOUTS_MARKET
        value: es
      # OPTIONAL. Durable Postgres cache for the on-demand live fares. Set to a Neon
      # connection string (prefer the DIRECT, non-pooler DSN for a single uvicorn
      # worker) to persist fetched fares across restarts -> survives Render free-tier
      # cold starts and unlocks the 90-day / all-Europe grid. Unset -> an in-process
      # dict cache is used instead (resets on every restart; no other behaviour
      # change). Only exercised together with TRAVELPAYOUTS_TOKEN.
      - key: DATABASE_URL
        sync: false
      # OPTIONAL. Days before a cached fare is treated as stale and re-fetched.
      # Must be in (0, 365]; defaults to 7 (matches Travelpayouts' freshness window).
      # Uncomment to override.
      # - key: FARE_CACHE_TTL_DAYS
      #   value: "7"
